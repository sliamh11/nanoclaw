name: Publish MCP Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Build and publish @deus-ai/channel-core
        working-directory: packages/mcp-channel-core
        run: |
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @deus-ai/whatsapp-mcp
        working-directory: packages/mcp-whatsapp
        run: |
          # Point to published @deus-ai/channel-core instead of local file path
          npm pkg set 'dependencies.@deus-ai/channel-core=^1.0.0'
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build and publish @deus-ai/telegram-mcp
        working-directory: packages/mcp-telegram
        run: |
          # Point to published @deus-ai/channel-core instead of local file path
          npm pkg set 'dependencies.@deus-ai/channel-core=^1.0.0'
          npm install
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
