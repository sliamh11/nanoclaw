name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Pattern drift check
        run: python3 scripts/drift_check.py --all --base origin/${{ github.base_ref }}

      - name: Pattern tests (Python)
        run: python3 -m pytest scripts/tests/test_drift_check.py -v

      - name: Validate commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  test-packages:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
      - uses: actions/setup-node@v6
        if: steps.filter.outputs.packages == 'true'
        with:
          node-version: 20
      - name: Build and test packages
        if: steps.filter.outputs.packages == 'true'
        run: |
          # Build core first (dependency for all channel packages)
          cd packages/mcp-channel-core && npm install && npm run build && npm test && cd ../..
          # Build and test all channel packages dynamically
          for pkg in packages/mcp-*/; do
            [ "$pkg" = "packages/mcp-channel-core/" ] && continue
            echo "::group::Testing $pkg"
            cd "$pkg" && npm install && npm run build && npm test && cd ../..
            echo "::endgroup::"
          done

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run
