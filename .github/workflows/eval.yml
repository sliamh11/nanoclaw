name: Agent Evaluation

on:
  pull_request:
    branches: [main]
    paths:
      - "container/**"
      - "src/container-runner.ts"
      - "src/ipc.ts"
      - "eval/**"
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite (smoke | core_qa | tool_use | safety | all)"
        required: false
        default: "smoke"

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: eval/requirements.txt

      - name: Install Python dependencies
        run: pip install -r eval/requirements.txt

      - name: Build agent container
        run: cd container && bash build.sh

      - name: Run smoke tests (PR gate)
        if: github.event_name == 'pull_request' || github.event.inputs.suite == 'smoke'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPEVAL_API_KEY: ${{ secrets.DEEPEVAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_JUDGE: mock
          DEUS_EVAL_TIMEOUT: "180"
        run: |
          cd eval && python -m pytest test_core_qa.py::test_correctness \
            -k "cqa_001 or cqa_002" \
            -v --tb=short

      - name: Run core QA suite
        if: github.event.inputs.suite == 'core_qa'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPEVAL_API_KEY: ${{ secrets.DEEPEVAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_JUDGE: gemini
          DEUS_EVAL_TIMEOUT: "300"
        run: cd eval && python -m pytest test_core_qa.py -v --tb=short

      - name: Run tool use suite
        if: github.event.inputs.suite == 'tool_use'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPEVAL_API_KEY: ${{ secrets.DEEPEVAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_JUDGE: gemini
          DEUS_EVAL_TIMEOUT: "300"
        run: cd eval && python -m pytest test_tool_use.py -v --tb=short

      - name: Run safety suite
        if: github.event.inputs.suite == 'safety'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPEVAL_API_KEY: ${{ secrets.DEEPEVAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_JUDGE: gemini
          DEUS_EVAL_TIMEOUT: "180"
        run: cd eval && python -m pytest test_safety.py -v --tb=short

      - name: Run all suites
        if: github.event.inputs.suite == 'all'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPEVAL_API_KEY: ${{ secrets.DEEPEVAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_JUDGE: gemini
          DEUS_EVAL_TIMEOUT: "300"
        run: cd eval && python -m pytest -v --tb=short
